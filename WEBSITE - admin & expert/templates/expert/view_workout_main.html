{% extends 'expert/expertindex.html' %}
{% block body %}

<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
        }

        .container-slim {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 40px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .category-list {
            list-style: none;
            padding: 0;
        }

        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .category-item:hover {
            background-color: #fafafa;
            border-color: #d1d1d1;
        }

        .category-name {
            font-size: 1rem;
            font-weight: 500;
            color: #333;
            display: flex;
            align-items: center;
        }

        .category-name i {
            color: #888;
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }

        .btn-minimal {
            color: #0066cc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .btn-minimal:hover {
            background-color: #eef6ff;
            color: #004499;
            text-decoration: none;
        }

        .empty-text {
            text-align: center;
            color: #999;
            margin-top: 50px;
        }
    </style>
</head>

<body>
    <div class="container-slim">
        <div class="page-header">
            <h2 style="font-weight: 700; margin-bottom: 5px;">Workout Library</h2>
            <p style="color: #666; font-size: 0.95rem;">Select a category to manage exercises.</p>
        </div>

        <ul class="category-list">
            {% for i in data %}
            <li class="category-item">
                <div class="category-name">
                    <i class="fas fa-folder"></i>
                    {{ i.workout }}
                </div>
                <a href="view_workout_details/{{ i.id }}" class="btn-minimal">
                    Add Details <i class="fas fa-chevron-right" style="font-size: 0.7rem; margin-left: 5px;"></i>
                </a>
            </li>
            {% empty %}
            <p class="empty-text">No workout categories found.</p>
            {% endfor %}
        </ul>
    </div>
</body>

{% endblock %}
