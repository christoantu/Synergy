{% extends 'admin/adminhome.html' %}

{% block body %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="text-center mb-4">
                <div class="d-inline-block p-3 rounded-circle bg-white shadow-sm mb-3">
                    <i class="bi bi-briefcase text-primary fs-3"></i>
                </div>
                <h3 class="fw-bold text-dark">New Work Assignment</h3>
                <p class="text-muted">Connect an expert with a customer to start a program</p>
            </div>

            <div class="card border-0 shadow-sm p-2" style="border-radius: 24px; background: #ffffff;">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase tracking-wider text-muted mb-2 d-block">Expert In Charge</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-award"></i></span>
                                <select class="form-select border-0 bg-light py-2" name="EXPERT" required>
                                    <option value="" selected disabled>Select Trainer</option>
                                    {% for i in data %}
                                        <option value="{{ i.id }}">{{ i.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase tracking-wider text-muted mb-2 d-block">Target Customer</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                                <select class="form-select border-0 bg-light py-2" name="CUSTOMER" required>
                                    <option value="" selected disabled>Select User</option>
                                    {% for i in customer %}
                                        <option value="{{ i.id }}">{{ i.Name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase tracking-wider text-muted mb-2 d-block">Assignment Title</label>
                            <input type="text" class="form-control border-0 bg-light py-2"
                                   name="work" placeholder="e.g., 30-Day Yoga Challenge" required>
                        </div>

                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase tracking-wider text-muted mb-2 d-block">Program Objectives</label>
                            <textarea class="form-control border-0 bg-light" name="details" rows="3"
                                      placeholder="List key goals or steps..." required></textarea>
                        </div>

                        <div class="pt-2">
                            <button type="submit" name="submit" class="btn btn-dark w-100 py-3 fw-bold shadow" style="border-radius: 12px;">
                                Confirm Assignment
                            </button>
                            <a href="javascript:history.back()" class="btn btn-link w-100 text-muted text-decoration-none mt-2 small">
                                Cancel and Return
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-5 text-center">
                <div class="d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-shield-check text-success"></i>
                    <span class="text-muted small">Secure Admin Action</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* SaaS-Style Internal CSS */
    body {
        background-color: #fcfdfe; /* Very light blue-grey background */
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .form-select, .form-control {
        border-radius: 10px !important;
        font-size: 0.95rem;
    }

    .input-group-text {
        border-radius: 10px 0 0 10px !important;
    }

    .form-control:focus, .form-select:focus {
        background-color: #ffffff !important;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.08) !important;
        border: 1px solid #0d6efd !important;
    }

    .tracking-wider {
        letter-spacing: 0.05em;
    }

    /* Subtle hover for the button */
    .btn-dark {
        background-color: #1a1a1a;
        transition: transform 0.2s;
    }

    .btn-dark:hover {
        transform: translateY(-2px);
        background-color: #333;
    }
</style>

{% endblock %}
