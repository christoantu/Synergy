<!DOCTYPE html>
<html lang="en">
<head>
    <!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg1:#0f172a; --bg2:#111827;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --txt:#e5e7eb; --muted:#9ca3af;
      --accent:#22c55e;
    }
    body{
      min-height:100vh;
      background:
        radial-gradient(900px 450px at 10% 10%, #1f2937 0%, transparent 60%),
        radial-gradient(850px 500px at 90% 20%, #0b4b2d 0%, transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--txt);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }
    .glass-card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    .brand-badge{
      width:44px; height:44px; border-radius:14px;
      display:grid; place-items:center;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color:#052e16; font-weight:900;
    }
    .form-control, .form-control:focus{
      background: rgba(0,0,0,0.25);
      border-color: rgba(255,255,255,0.18);
      color: var(--txt);
      box-shadow: none;
    }
    .form-control::placeholder{ color: rgba(229,231,235,.55); }
    .form-control:focus{
      border-color: rgba(34,197,94,.7);
      box-shadow: 0 0 0 .25rem rgba(34,197,94,.15);
    }
    .btn-accent{
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      color:#052e16;
      font-weight: 800;
    }
    .btn-accent:active{ transform: scale(.99); }
    .text-muted-soft{ color: var(--muted) !important; }
    a.link-green{ color:#86efac; text-decoration:none; }
    a.link-green:hover{ text-decoration:underline; }
  </style>
</head>

<body class="d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="glass-card p-4 p-md-5">
          <div class="d-flex align-items-center gap-3 mb-3">
            <div class="brand-badge">F</div>
            <div>
              <h1 class="h4 mb-1">Forgot your password?</h1>
              <p class="mb-0 text-muted-soft small">Enter your email and we’ll send you a reset link.</p>
            </div>
          </div>

          <!-- Alert (optional) -->
          <!--
          <div class="alert alert-danger py-2 small" role="alert">
            Please enter a valid email address.
          </div>
          -->

          <form action="/web_forgot_password/" method="post" class="mt-3">
            <!-- If using Django, keep this: {% csrf_token %} -->

            <div class="mb-3">
              <label for="email" class="form-label text-muted-soft">Email address</label>
              <input type="email" class="form-control form-control-lg" id="email" name="email"
                     placeholder="name@example.com" required>
            </div>

            <button type="submit" class="btn btn-accent btn-lg w-100">
              Send reset link
            </button>

            <div class="d-flex justify-content-between mt-3 small">
              <a class="link-green" href="login.html">Back to login</a>
              <a class="link-green" href="index.html">Home</a>
            </div>

            <p class="text-center text-muted-soft small mt-3 mb-0">
              If you don’t receive an email, check spam or try again.
            </p>
          </form>
        </div>

        <p class="text-center text-muted-soft small mt-3">
          © 2026 Fitness App
        </p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</head>
<body>

</body>
</html>
